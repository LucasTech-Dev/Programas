<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D20Web — A aventura começa aqui.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --violet:    #9b5de5;
      --violet-lt: #c77dff;
      --gold:      #f4a217;
      --gold-lt:   #ffd166;
      --bg:        #0b0a10;
      --border:    rgba(155, 93, 229, 0.15);
      --text:      #ede8f5;
      --muted:     rgba(237, 232, 245, 0.42);
      --transition: 0.35s cubic-bezier(.4,0,.2,1);

      /* ponto de encontro das chamas = centro do painel esquerdo */
      --card-w: clamp(340px, 36vw, 480px);
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ════════════════════════════════
       BACKGROUND GLOBAL — cor sólida
    ════════════════════════════════ */
    .bg-layer { display: none; } /* removido — gif agora é local */

    /* ════════════════════════════════
       GIF — apenas no painel esquerdo
    ════════════════════════════════ */
    .brand-gif {
      position: absolute; inset: 0;
      z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.90;
      filter: saturate(1.5) brightness(0.88);
    }
    /* vinheta suave nas bordas do painel esquerdo */
    .brand-gif-vignette {
      position: absolute; inset: 0; z-index: 1;
      background:
        /* escurece borda direita — transição para o card */
        linear-gradient(to right,
          rgba(11,10,16,0.00) 50%,
          rgba(11,10,16,0.55) 80%,
          rgba(11,10,16,0.90) 100%
        ),
        /* vinheta circular nas bordas */
        radial-gradient(ellipse 90% 90% at 40% 50%,
          transparent 40%,
          rgba(11,10,16,0.45) 100%
        );
    }

    /* ── PARTICLES ── */
    canvas#particles {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none;
    }

    /* ════════════════════════════════
       LAYOUT — dois painéis
    ════════════════════════════════ */
    .side-brand {
      position: relative; z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px 140px 60px;
      overflow: hidden; /* confina o gif */
      animation: fadeUp 1s 0.15s cubic-bezier(.4,0,.2,1) both;
    }

    .brand-icon {
      width: 380px; height: 380px;
      margin-bottom: 22px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 2;
    }
    .brand-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter:
        drop-shadow(0 0 20px rgba(155,93,229,0.80))
        drop-shadow(0 0 50px rgba(155,93,229,0.35));
      animation: floatLogo 5s ease-in-out infinite alternate;
    }
    @keyframes floatLogo {
      from { transform: translateY(0px);  }
      to   { transform: translateY(-9px); }
    }

    .brand-name {
      position: relative; z-index: 2;
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      background: linear-gradient(135deg, var(--violet-lt) 0%, var(--gold-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .brand-tagline {
      position: relative; z-index: 2;
      margin-top: 10px;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ════════════════════════════════
       CARD — painel direito full-height
       O card É a origem da chama vermelha:
       seu ::before projeta um glow laranja/vermelho
       para a esquerda, que se funde com o roxo do GIF
       exatamente na posição do dado.
    ════════════════════════════════ */
    .side-card {
      position: relative; z-index: 10;
      width: var(--card-w);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* fundo escuro semitransparente — o blur cria o glass */
      background: rgba(10, 8, 18, 0.96);
      backdrop-filter: blur(28px) saturate(1.3);
      -webkit-backdrop-filter: blur(28px) saturate(1.3);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 40px rgba(0,0,0,0.35);
      animation: slideIn 0.9s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(36px); }
      to   { opacity: 1; transform: translateX(0);    }
    }

    /* linha decorativa roxa no topo do card */
    .side-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--violet) 50%, transparent 100%);
      opacity: 0.50;
      z-index: 1;
    }

    .card-inner {
      position: relative; z-index: 2;
      width: 100%;
      padding: 52px 44px;
    }

    /* ── FORMS ── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field-group {
      display: flex; flex-direction: column;
      gap: 18px; margin-bottom: 28px;
    }
    .field { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: 0.70rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--muted);
      transition: color var(--transition);
      pointer-events: none;
    }
    input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: var(--transition);
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--violet);
      background: rgba(155,93,229,0.07);
      box-shadow: 0 0 0 3px rgba(155,93,229,0.11);
    }
    .input-wrap:focus-within svg { color: var(--violet-lt); }

    .divider {
      display: flex; align-items: center;
      gap: 12px; margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.70rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .btn-primary {
      width: 100%; padding: 14px;
      border: none; border-radius: 8px;
      background: linear-gradient(135deg, var(--violet) 0%, #7b2fbe 100%);
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 0.86rem; font-weight: 600;
      letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(155,93,229,0.32);
      margin-bottom: 12px;
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 55%);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 32px rgba(155,93,229,0.50); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      width: 100%; padding: 13px;
      border-radius: 8px;
      border: 1px solid rgba(155,93,229,0.25);
      background: transparent; color: var(--muted);
      font-family: 'Raleway', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      margin-bottom: 24px;
    }
    .btn-ghost:hover {
      border-color: var(--violet-lt);
      color: var(--violet-lt);
      background: rgba(155,93,229,0.06);
    }

    .btn-google {
      width: 100%; padding: 13px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.83rem; font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(13,11,20,0.94);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      padding: 11px 22px; border-radius: 40px;
      font-size: 0.81rem; color: var(--text);
      opacity: 0; pointer-events: none;
      transition: all 0.4s cubic-bezier(.4,0,.2,1);
      z-index: 200; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @media (max-width: 700px) {
      body { flex-direction: column; overflow-y: auto; }
      .side-brand { display: none; }
      .side-card { width: 100%; min-height: 100vh; border-left: none; }
      .side-card::before { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <!-- ══ Painel esquerdo — Brand (gif local aqui) ══ -->
  <div class="side-brand">
    <!-- GIF ocupa apenas este painel -->
    <img class="brand-gif" src="tavern/tavern.gif" alt="" aria-hidden="true" />
    <div class="brand-gif-vignette" aria-hidden="true"></div>
    <div class="brand-icon">
      <!-- MUDA A LOGO AQUI ZÉÉÉÉÉ   -->
      <img src="tavern/logoD20web.png" alt="D20Web logo" />
    </div>
    <h1 class="brand-name">D20Web</h1>
    <p class="brand-tagline">A aventura começa aqui</p>
  </div>

  <!-- ══ Painel direito — Card ══ -->
  <div class="side-card">
    <div class="card-inner">

      <!-- Login -->
      <div class="form-panel active" id="panel-login">
        <div class="field-group">
          <div class="field">
            <label for="login-email">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
          </div>
          <div class="field">
            <label for="login-pass">Senha</label>
            <div class="input-wrap">
              <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
          </div>
        </div>
        <button class="btn-primary" id="btn-login">Login</button>
        <button class="btn-ghost"   id="btn-goto-register">Cadastrar</button>
        <div class="divider">ou</div>
        <button class="btn-google" id="btn-google-login">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.4 35.3 26.8 36 24 36c-5.4 0-9.9-3-11.5-7.3l-6.6 5.1C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4-4.2 5.2l6.2 5.2c3.6-3.3 5.7-8.2 5.7-14.4 0-1.3-.1-2.7-.4-4z"/></svg>
          Continuar com Google
        </button>
      </div>

      <!-- Cadastro -->
      <div class="form-panel" id="panel-register">
        <div class="field-group">
          <div class="field">
            <label for="reg-name">Nome de aventureiro</label>
            <div class="input-wrap">
              <input type="text" id="reg-name" placeholder="Como te chamarão?" autocomplete="nickname" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>
          <div class="field">
            <label for="reg-email">E-mail</label>
            <div class="input-wrap">
              <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
          </div>
          <div class="field">
            <label for="reg-pass">Senha</label>
            <div class="input-wrap">
              <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
          </div>
        </div>
        <button class="btn-primary" id="btn-register">Criar conta</button>
        <button class="btn-ghost"   id="btn-back-login">← Voltar ao Login</button>
        <div class="divider">ou</div>
        <button class="btn-google" id="btn-google-reg">
          <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.1 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8 20-20 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.1 18.9 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.3 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.4 35.3 26.8 36 24 36c-5.4 0-9.9-3-11.5-7.3l-6.6 5.1C9.6 39.5 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4-4.2 5.2l6.2 5.2c3.6-3.3 5.7-8.2 5.7-14.4 0-1.3-.1-2.7-.4-4z"/></svg>
          Continuar com Google
        </button>
      </div>

    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    'use strict';

    /* ── PARTÍCULAS ── */
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const particles = [];

    const resize = () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x       = Math.random() * W;
        this.y       = init ? Math.random() * H : H + 6;
        this.r       = Math.random() * 1.6 + 0.3;
        this.vx      = (Math.random() - 0.5) * 0.28;
        this.vy      = -(Math.random() * 0.45 + 0.18);
        this.life    = 0;
        this.maxLife = Math.random() * 220 + 100;
        const hue    = Math.random() < 0.6 ? 270 + Math.random() * 30 : 35 + Math.random() * 20;
        this.color   = `hsl(${hue},80%,70%)`;
      }
      update() {
        this.x += this.vx; this.y += this.vy; this.life++;
        const t = this.life / this.maxLife;
        this.alpha = t < 0.2 ? t / 0.2 : t > 0.8 ? (1 - t) / 0.2 : 1;
        if (this.life >= this.maxLife) this.reset();
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.65;
        ctx.fillStyle   = this.color;
        ctx.shadowBlur  = 5; ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());
    const animate = () => {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    };
    animate();

    /* ── TROCA DE PAINEL ── */
    const panels   = document.querySelectorAll('.form-panel');
    const switchTo = id => panels.forEach(p => p.classList.toggle('active', p.id === id));
    document.getElementById('btn-goto-register').addEventListener('click', () => switchTo('panel-register'));
    document.getElementById('btn-back-login').addEventListener('click',    () => switchTo('panel-login'));

    /* ── TOAST ── */
    const toast = document.getElementById('toast');
    let toastTimer;
    const showToast = (msg, ms = 3000) => {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
    };

    /* ── RIPPLE ── */
    const rippleStyle = document.createElement('style');
    rippleStyle.textContent = `@keyframes rippleAnim{to{transform:scale(2.5);opacity:0}}`;
    document.head.appendChild(rippleStyle);

    document.querySelectorAll('.btn-primary, .btn-google').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const rect   = this.getBoundingClientRect();
        const size   = Math.max(rect.width, rect.height);
        const ripple = document.createElement('span');
        Object.assign(ripple.style, {
          position: 'absolute', borderRadius: '50%',
          width: `${size}px`, height: `${size}px`,
          left: `${e.clientX - rect.left - size / 2}px`,
          top:  `${e.clientY - rect.top  - size / 2}px`,
          background: 'rgba(255,255,255,0.14)',
          transform: 'scale(0)', pointerEvents: 'none',
          animation: 'rippleAnim 0.5s ease-out forwards'
        });
        this.style.position = 'relative';
        this.style.overflow = 'hidden';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 500);
      });
    });

    /* ── FORMS ── */
    document.getElementById('btn-login').addEventListener('click', () => {
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      if (!email || !pass) { showToast('⚠️ Preencha todos os campos.'); return; }
      showToast('⚔️ Bem-vindo de volta, aventureiro!');
    });
    document.getElementById('btn-register').addEventListener('click', () => {
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-pass').value;
      if (!name || !email || !pass) { showToast('⚠️ Preencha todos os campos.'); return; }
      if (pass.length < 6) { showToast('🔒 Senha precisa ter ao menos 6 caracteres.'); return; }
      showToast('✨ Conta criada! Sua jornada começa agora.');
    });
    document.querySelectorAll('.btn-google').forEach(btn =>
      btn.addEventListener('click', () => showToast('🎲 Redirecionando para o Google...'))
    );
  </script>
</body>
</html>
