<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de produtos gráficos personalizados">
  <title>Gráfica Demo — Catálogo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/loja.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="header__logo">
      <img src="img/logoDemo.png" alt="Logo Gráfica">
    </a>

    <h1 class="header__title">Catálogo</h1>

    <nav class="header__actions">
      <a href="busc.html" class="btn-icon" title="Buscar">
        <i class="mdi mdi-magnify"></i>
      </a>
      <a href="carrinho.html" id="btnCarrinho" class="btn-carrinho">
        <i class="mdi mdi-cart-outline"></i>
        <span id="totalCarrinhoHeader">0</span>
      </a>
    </nav>
  </header>

  <!-- HERO BANNER -->
  <section class="hero">
    <div class="hero__content">
      <p class="hero__eyebrow">Gráfica Personalizada</p>
      <h2 class="hero__headline">Sua marca<br>impressa com<br>qualidade.</h2>
      <a href="busc.html" class="btn-primary">
        <i class="mdi mdi-magnify"></i> Buscar produtos
      </a>
    </div>
    <div class="hero__visual">
      <div class="hero__badge">8 produtos</div>
    </div>
  </section>

  <!-- PRODUTOS -->
  <main class="container">
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>Carregando produtos…</p>
    </div>

    <div id="listaProdutos" class="produtos" style="display:none;"></div>
  </main>

  <script src="js/modal.js"></script>
  <script src="js/loja.js"></script>
</body>
</html>
