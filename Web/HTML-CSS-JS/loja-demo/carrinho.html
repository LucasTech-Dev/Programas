<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seu Pedido — Gráfica Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/loja.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="header__logo">
      <img src="img/logoDemo.png" alt="Logo">
    </a>
    <h1 class="header__title">Seu Pedido</h1>
    <nav class="header__actions">
      <a href="index.html" class="btn-icon" title="Voltar à loja">
        <i class="mdi mdi-home-outline"></i>
      </a>
      <div class="badge-total">
        <i class="mdi mdi-cart-outline"></i>
        <span id="quantidadeNoCarrinho">0</span>
      </div>
    </nav>
  </header>

  <main class="container container--carrinho">

    <!-- ITENS -->
    <section class="carrinho-itens">
      <div id="listaCarrinho"></div>

      <div class="carrinho-acoes">
        <button class="btn-danger" onclick="limparCarrinho()">
          <i class="mdi mdi-trash-can-outline"></i> Limpar carrinho
        </button>
      </div>
    </section>

    <!-- RESUMO + FORMULÁRIO -->
    <aside class="carrinho-resumo">
      <h2 class="resumo__title">Finalizar Pedido</h2>

      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome">
      </div>

      <div class="form-group">
        <label for="endereco">Endereço de entrega</label>
        <input type="text" id="endereco" placeholder="Rua, número, bairro…">
      </div>

      <div class="form-group">
        <label for="pagamento">Forma de pagamento</label>
        <select id="pagamento">
          <option value="Pix">Pix</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="Cartão">Cartão</option>
        </select>
      </div>

      <div id="totalResumo" class="resumo__total">
        Total: <strong>R$ 0,00</strong>
      </div>

      <button class="btn-whatsapp" onclick="finalizarPedido()">
        <i class="mdi mdi-whatsapp"></i> Finalizar no WhatsApp
      </button>
    </aside>

  </main>

  <script src="js/carrinho.js"></script>
  <script src="js/whatsapp.js"></script>
</body>
</html>
