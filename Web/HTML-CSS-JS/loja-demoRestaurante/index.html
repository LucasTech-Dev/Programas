<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Cardápio digital para restaurante">
  <meta name="theme-color" content="#B91C1C">
  <title>Restaurante Demo — Cardápio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style/loja.css">
</head>
<body>
 
  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="header__logo">
      <img src="img/logoDemo.png" alt="Logo Restaurante">
    </a>

    <h1 class="header__title">Cardápio</h1>

    <nav class="header__actions">
      <a href="busc.html" class="btn-icon" title="Buscar">
        <i class="mdi mdi-magnify"></i>
      </a>
      <a href="carrinho.html" id="btnCarrinho" class="btn-carrinho">
        <i class="mdi mdi-cart-outline"></i>
        <span id="totalCarrinhoHeader">0</span>
      </a>
    </nav>
  </header>

  <!-- HERO BANNER -->
  <section class="hero">
    <div class="hero__content">
      <p class="hero__eyebrow"><span class="reg-mark" aria-hidden="true"></span> Restaurante Demo</p>
      <h2 class="hero__headline">Pratos prontos<br>para pedir<br>agora.</h2>
      <a href="busc.html" class="btn-primary">
        <i class="mdi mdi-magnify"></i> Buscar pratos
      </a>
    </div>
    <div class="hero__visual">
      <div class="hero__badge">
        <div class="swatch swatch--1"></div>
        <div class="swatch swatch--2"></div>
        <div class="swatch swatch--3">
          <strong>8</strong>
          <small>pratos no cardápio</small>
        </div>
      </div>
    </div>
  </section>

  <!-- PRODUTOS -->
  <main class="container">
    <div id="loadingState" class="loading-state">
      <div class="spinner"><span></span><span></span><span></span><span></span></div>
      <p>Carregando pratos...</p>
    </div>

    <div id="listaProdutos" class="produtos" style="display:none;"></div>
  </main>

  <script src="js/modal.js"></script>
  <script src="js/loja.js"></script>
</body>
</html>
