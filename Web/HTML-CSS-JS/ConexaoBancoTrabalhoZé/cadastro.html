<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Firebase</title>
</head>

<body>

    <h2>Cadastro de Usuário</h2>

    <form id="formCadastro">

        <input
            type="text"
            id="nome"
            placeholder="Nome"
            required>

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            id="senha"
            placeholder="Senha"
            required>

        <br><br>

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <script type="module" src="script/cadastro.js"></script>

</body>

</html>
