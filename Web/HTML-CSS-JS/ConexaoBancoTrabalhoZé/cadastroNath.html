<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Nath</title>
    <link rel="stylesheet" href="style/cadastroNath.css">
</head>

<body>

<body>

    <div class="container">

        <h1>💖 Cadastro Nath 💖</h1>

        <form id="formCadastro">

            <input
                type="text"
                id="nome"
                placeholder="Seu nome"
                required>

            <input
                type="email"
                id="email"
                placeholder="Seu email"
                required>

            <input
                type="password"
                id="senha"
                placeholder="Sua senha"
                required>

            <button type="submit">
                Cadastrar
            </button>

        </form>

    </div>

    <script type="module" src="script/cadastroNath.js"></script>

</body>

</html>
